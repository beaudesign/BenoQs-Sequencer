<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>BenoQs Panel v2 — pixel-anchored layout</title>
<style>
  /* Tokens chosen to match index.html where possible (Pivot/Tonality calm paper) */
  :root {
    --bg: #f2efe8;
    --bg-panel: #e9e5dc;
    --engraved: rgba(20,16,10,.42);
    --engraved-strong: rgba(20,16,10,.62);
    --hairline: rgba(20,16,10,.10);
    --green: #3cb818;
    --red: #c41c1c;
    --orange: #d97818;
    --root: #c97818;
    --led-idle: #b8b4ac;
    --font: "Helvetica Neue", -apple-system, system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--bg); font-family: var(--font); }
  .stage {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 8px;
  }
  svg.panel { width: 100%; height: 100%; max-height: 100vh; }

  /* Engraved label style (rendered as SVG text). */
  .label { fill: var(--engraved); font-family: var(--font); }
  .label-strong { fill: var(--engraved-strong); }
  .label-italic { font-style: italic; }
  /* Musical-symbol fallback chain so clefs render cross-platform. */
  .clef { font-family: "Bravura", "Bravura Text", "Petaluma", "Noto Music",
          "Maestro", "Times New Roman", serif; }

  /* Flush LED appearance — slight rim, no heavy 3D shading. */
  .led { stroke: rgba(20,16,10,.22); stroke-width: 0.6; }
  .led[data-state="green"],
  .led[data-state="red"],
  .led[data-state="orange"],
  .led[data-state="green_shine"],
  .led[data-state="red_shine"],
  .led[data-state="orange_shine"] { stroke: rgba(20,16,10,.10); }
  .led-sm { /* matrix / sel / mut / attribute selector */ }
  .led-md { /* mix target strip, chord notes, scale ring */ }
  .led-lg { /* mode block etc. */ }

  /* Encoder shaft (large chrome rotary). */
  .encoder { stroke: rgba(20,16,10,.20); stroke-width: 1; }

  /* Hairline guide for matrix beat divisions; faint until enabled. */
  .beat-guide { stroke: rgba(20,16,10,.20); stroke-width: 1; }

  /* Faint outer ring around the Circle area for orientation. */
  .guide-ring { fill: none; stroke: var(--hairline); stroke-width: 1; }

  /* ── LED state vocabulary (per reference manual §Step skip pg 14) ─────────
     off, green, red, orange — solid lit
     *_flash — alternating opacity (blink)
     *_shine — brighter than solid (used for hyperstep marker etc.)
  ────────────────────────────────────────────────────────────────────────── */
  .led[data-state="off"]           { fill: url(#led-off); }
  .led[data-state="green"]         { fill: var(--green); }
  .led[data-state="red"]           { fill: var(--red); }
  .led[data-state="orange"]        { fill: var(--orange); }
  .led[data-state="green_shine"]   { fill: #76f44a; }
  .led[data-state="red_shine"]     { fill: #ff3838; }
  .led[data-state="orange_shine"]  { fill: #ff9a2a; }
  .led[data-state="green_flash"]   { fill: var(--green);  animation: led-flash 600ms steps(2) infinite; }
  .led[data-state="red_flash"]     { fill: var(--red);    animation: led-flash 600ms steps(2) infinite; }
  .led[data-state="orange_flash"]  { fill: var(--orange); animation: led-flash 600ms steps(2) infinite; }

  @keyframes led-flash {
    0%, 49%   { opacity: 1; }
    50%, 100% { opacity: 0.25; }
  }

  /* ── Dev panel (collapsible overlay; not part of the hardware) ───────── */
  #dev-panel {
    position: fixed; top: 12px; right: 12px;
    background: rgba(20,16,10,.88); color: #f4f1ea;
    font: 12px/1.3 var(--font);
    border-radius: 6px; padding: 8px 10px;
    z-index: 10; max-width: 240px;
    box-shadow: 0 4px 16px rgba(0,0,0,.25);
  }
  #dev-panel header {
    display: flex; align-items: center; justify-content: space-between;
    margin: -2px 0 6px;
  }
  #dev-panel header h4 { font-size: 11px; font-weight: 600; letter-spacing: .04em; opacity: .82; }
  #dev-panel button.toggle { background: transparent; border: 0; color: inherit; cursor: pointer; font-size: 14px; }
  #dev-panel[data-collapsed="true"] .dev-body { display: none; }
  #dev-panel .state-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; margin-bottom: 6px; }
  #dev-panel .state-grid button {
    font: inherit; color: #f4f1ea; background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.12); border-radius: 4px;
    padding: 4px 6px; cursor: pointer; text-align: left;
  }
  #dev-panel .state-grid button:hover { background: rgba(255,255,255,.16); }
  #dev-panel select {
    width: 100%; font: inherit; color: #f4f1ea;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
    border-radius: 4px; padding: 3px 5px; margin-bottom: 4px;
  }
  #dev-panel .hint { opacity: .55; font-size: 10px; line-height: 1.35; }
</style>
</head>
<body>
<aside id="dev-panel" data-collapsed="false">
  <header>
    <h4>LED state QA</h4>
    <button class="toggle" type="button" aria-label="Collapse">−</button>
  </header>
  <div class="dev-body">
    <select id="dev-scope" aria-label="Scope">
      <option value="all">all LEDs</option>
      <option value="matrix">matrix only</option>
      <option value="sel">SEL column</option>
      <option value="mut">MUT column</option>
      <option value="attr">attribute selectors</option>
      <option value="mixtarget">MIX TARGET row</option>
      <option value="mode">MODE block</option>
      <option value="transport">transport</option>
      <option value="scale">scale ring + inner</option>
      <option value="chord">CHORD column</option>
      <option value="tempo">tempo dots</option>
    </select>
    <div class="state-grid" id="dev-state-grid"></div>
    <div class="hint">Or use the console: <code>setLed(id, state)</code>. Ids: matrix-r0..9-c0..15, mix-encoder-N, sel-N, mut-N, mode-{grid|page|track|step|map|play}, scale-note-0..11, etc.</div>
    <h4 style="margin-top:8px;font-size:11px;font-weight:600;letter-spacing:.04em;opacity:.82;">Demo</h4>
    <div style="margin-top:4px;display:flex;gap:4px;">
      <button id="dev-demo-run" type="button" style="flex:1;font:inherit;color:#f4f1ea;background:rgba(94,180,68,.22);border:1px solid rgba(94,180,68,.42);border-radius:4px;padding:4px 6px;cursor:pointer;">▶ Run demo</button>
      <button id="dev-demo-stop" type="button" style="font:inherit;color:#f4f1ea;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:4px;padding:4px 8px;cursor:pointer;">■</button>
    </div>
    <h4 style="margin-top:8px;font-size:11px;font-weight:600;letter-spacing:.04em;opacity:.82;">Outgoing (octoEmit)</h4>
    <pre id="emit-log" style="margin-top:4px;font:11px/1.35 ui-monospace,Menlo,monospace;color:#d6f0c4;background:rgba(255,255,255,.04);padding:6px 8px;border-radius:4px;max-height:140px;overflow:auto;white-space:pre-wrap;"></pre>
  </div>
</aside>

<div class="stage">
  <svg class="panel" viewBox="0 0 2400 1300" xmlns="http://www.w3.org/2000/svg" id="panel-svg" aria-label="BenoQs Panel">
    <defs>
      <!-- Chrome encoder: bright specular highlight upper-left, gradient
           through middle tones, deep shadow lower-right. -->
      <radialGradient id="chrome" cx="32%" cy="24%" r="80%">
        <stop offset="0%"   stop-color="#ffffff"/>
        <stop offset="12%"  stop-color="#f4f0e7"/>
        <stop offset="45%"  stop-color="#c0bcb3"/>
        <stop offset="78%"  stop-color="#7a7669"/>
        <stop offset="100%" stop-color="#3e3b34"/>
      </radialGradient>
      <!-- Secondary specular for the chrome cap (smaller, sharper highlight). -->
      <radialGradient id="chrome-cap" cx="40%" cy="30%" r="60%">
        <stop offset="0%"   stop-color="rgba(255,255,255,.95)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
      <!-- Idle LED: flush PCB-mount appearance, low-contrast dome. -->
      <radialGradient id="led-off" cx="45%" cy="40%" r="60%">
        <stop offset="0%"   stop-color="#d6d2c8"/>
        <stop offset="70%"  stop-color="#c2bdb3"/>
        <stop offset="100%" stop-color="#b0aca2"/>
      </radialGradient>
      <!-- Bright halo for lit states (used by green/red/orange shines). -->
      <radialGradient id="led-halo" cx="50%" cy="50%" r="60%">
        <stop offset="0%"   stop-color="rgba(255,255,255,.55)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
      <!-- Soft ground shadow under encoders (drop-shadow filter is supported
           by Chromium / Safari / Firefox in current versions). -->
      <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
        <feOffset dx="0" dy="1.5" result="off"/>
        <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
        <feComposite in2="off" operator="in"/>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Panel face (cream) + faint inner hairline frame to suggest the
         engraved metal-on-wood boundary of the hardware. -->
    <rect x="0" y="0" width="2400" height="1300" fill="var(--bg-panel)"/>
    <rect x="18" y="18" width="2364" height="1264" fill="none"
          stroke="rgba(20,16,10,.10)" stroke-width="1"/>
    <rect x="26" y="26" width="2348" height="1248" fill="none"
          stroke="rgba(20,16,10,.06)" stroke-width="0.5"/>

    <!-- Wordmarks (top corners) -->
    <text x="60"   y="60" class="label" font-size="22">genoQs Machines</text>
    <text x="2340" y="60" class="label label-italic label-strong" font-size="32" text-anchor="end">octopus</text>

    <!-- All interactive elements injected by JS below for readability. -->
    <g id="g-clefs"   ></g>
    <g id="g-rownums" ></g>
    <g id="g-mix"     ></g>
    <g id="g-sel"     ></g>
    <g id="g-matrix"  ></g>
    <g id="g-beats"   ></g>
    <g id="g-attr"    ></g>
    <g id="g-mut"     ></g>
    <g id="g-edit"    ></g>
    <g id="g-bottom"  ></g>
    <g id="g-circle"  ></g>
    <g id="g-chord"   ></g>
    <g id="g-labels"  ></g>
  </svg>
</div>

<script src="adapter.js"></script>
<script src="interactions.js"></script>
<script>
"use strict";

/* ── Geometry constants (all viewBox units; 1u ≈ 1mm at full panel size) ── */
const PANEL_W = 2400, PANEL_H = 1300;

const ROW_COUNT = 10;
const ROW_PITCH = 60;
const MATRIX_TOP_Y = 250;        // center of row 9 (top-most)
const rowY = (r) => MATRIX_TOP_Y + (ROW_COUNT - 1 - r) * ROW_PITCH;  // r=9 top, r=0 bottom

const COL_COUNT = 16;
const COL_PITCH = 56;
const MATRIX_LEFT_X = 350;       // center of col 0
const colX = (c) => MATRIX_LEFT_X + c * COL_PITCH;

/* Column block centers (X). */
const X_CLEF    = 50;
const X_ROWNUM  = 100;
const X_MIX     = 175;
const X_SEL     = 260;
const X_ATTR    = 1310;          // right of last matrix col (col 15 center = 350+15*56 = 1190; right edge of cell = 1218)
const X_MUT     = 1380;
const X_EDIT    = 1465;

/* Circle area. */
const C_CX = 1880, C_CY = 600;
const R_OUTER = 350;
const R_INNER = 170;
const R_MODE  = 110;             // inner mode-block radius

/* Chord column on the right. */
const X_CHORD       = 2300;
const CHORD_TOP_Y   = 260;
const CHORD_PITCH   = 60;
const CHORD_COUNT   = 7;         // 7 chord-note slots per reference manual §Chords

/* Bottom strip (MIX TARGET row + labels). */
const Y_MIX_TARGET  = 940;
const Y_LABEL_BAND  = 1010;

/* Element sizes. */
const R_BALL_SM = 16;            // matrix, SEL, MUT, attribute selectors, scale notes
const R_BALL_MD = 20;            // chord column, mix target
const R_BALL_LG = 26;            // mode block, transport
const R_ENC     = 32;            // mix / edit / main encoders
const R_ENC_MAIN = 38;           // top-right master/main encoder

/* ── DOM helpers ── */
const SVG_NS = "http://www.w3.org/2000/svg";
function el(tag, attrs, parent) {
  const node = document.createElementNS(SVG_NS, tag);
  for (const k in attrs) node.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(node);
  return node;
}
function text(parent, x, y, str, opts) {
  opts = opts || {};
  const t = el("text", {
    x, y,
    "text-anchor": opts.anchor || "middle",
    "dominant-baseline": opts.baseline || "central",
    "font-size": opts.size || 14,
    class: "label " + (opts["class"] || ""),
  }, parent);
  t.textContent = str;
  return t;
}

function ledBall(parent, id, cx, cy, r, kind) {
  return el("circle", {
    id,
    cx, cy, r,
    class: "led led-" + (kind || "sm"),
    fill: "url(#led-off)",
    "data-state": "off",
  }, parent);
}

// Transport glyphs rendered as proper SVG paths instead of Unicode symbols.
function transportGlyph(parent, type, cx, cy, size) {
  const s = size || 8;
  const g = el("g", { transform: `translate(${cx} ${cy})`, fill: "rgba(20,16,10,.62)", stroke: "none" }, parent);
  if (type === "play") {
    el("path", { d: `M -${s*0.6},-${s} L ${s*0.9},0 L -${s*0.6},${s} Z` }, g);
  } else if (type === "stop") {
    el("rect", { x: -s*0.8, y: -s*0.8, width: s*1.6, height: s*1.6 }, g);
  } else if (type === "pause") {
    el("rect", { x: -s*0.7, y: -s, width: s*0.5, height: s*2 }, g);
    el("rect", { x:  s*0.2, y: -s, width: s*0.5, height: s*2 }, g);
  } else if (type === "rec") {
    el("circle", { cx: 0, cy: 0, r: s*0.85, fill: "var(--red)" }, g);
  } else if (type === "back") {
    el("path", { d: `M ${s*0.6},-${s} L -${s*0.9},0 L ${s*0.6},${s} Z` }, g);
  } else if (type === "fwd") {
    el("path", { d: `M -${s*0.9},-${s*0.8} L ${s*0.1},0 L -${s*0.9},${s*0.8} Z` }, g);
    el("path", { d: `M ${s*0.1},-${s*0.8} L ${s*1.1},0 L ${s*0.1},${s*0.8} Z` }, g);
  }
  return g;
}

function encoder(parent, id, cx, cy, r) {
  // Layered chrome rendering:
  //   1. Outer shaft (radial gradient — bright top-left → dark bottom-right)
  //   2. Edge ring (subtle dark outline grounds the dome)
  //   3. Specular cap (sharper highlight)
  //   4. Indicator notch — at 12 o'clock (neutral). In a future pass this can
  //      rotate to reflect encoder value.
  const g = el("g", { id, class: "encoder-group", filter: "url(#dropshadow)" }, parent);
  el("circle", { cx, cy, r, class: "encoder", fill: "url(#chrome)" }, g);
  el("circle", { cx, cy, r: r - 0.5, fill: "none", stroke: "rgba(20,16,10,.45)", "stroke-width": 0.6 }, g);
  el("circle", { cx: cx - r * 0.18, cy: cy - r * 0.22, r: r * 0.52, fill: "url(#chrome-cap)" }, g);
  el("circle", { cx: cx, cy: cy - r * 0.72, r: r * 0.11, fill: "rgba(20,16,10,.72)" }, g);
  return g;
}

/* ── 1. Clefs and track row numbers ── */
const gClefs   = document.getElementById("g-clefs");
const gRownums = document.getElementById("g-rownums");
// Treble clef glyph for rows 9..5, bass clef for rows 4..0 (Unicode musical symbols).
text(gClefs, X_CLEF, rowY(7), "\u{1D11E}", { size: 56, "class": "label-strong clef" });
text(gClefs, X_CLEF, rowY(2), "\u{1D122}", { size: 56, "class": "label-strong clef" });
for (let r = 0; r < ROW_COUNT; r++) {
  text(gRownums, X_ROWNUM, rowY(r), String(r), { size: 22 });
}

/* ── 2. MIX encoder column (10 large rotaries) ── */
const gMix = document.getElementById("g-mix");
for (let r = 0; r < ROW_COUNT; r++) {
  encoder(gMix, `mix-encoder-${r}`, X_MIX, rowY(r), R_ENC);
}

/* ── 3. SEL button column (10 small balls) ── */
const gSel = document.getElementById("g-sel");
for (let r = 0; r < ROW_COUNT; r++) {
  ledBall(gSel, `sel-${r}`, X_SEL, rowY(r), R_BALL_SM, "sm");
}

/* ── 4. Matrix (10 rows × 16 cols) ── */
const gMatrix = document.getElementById("g-matrix");
for (let r = 0; r < ROW_COUNT; r++) {
  for (let c = 0; c < COL_COUNT; c++) {
    ledBall(gMatrix, `matrix-r${r}-c${c}`, colX(c), rowY(r), R_BALL_SM, "sm");
  }
}

/* ── 4b. Faint beat-division guides (vertical, every 4 cols) ── */
const gBeats = document.getElementById("g-beats");
for (let c = 4; c < COL_COUNT; c += 4) {
  const x = colX(c) - COL_PITCH / 2;
  el("line", {
    x1: x, y1: rowY(9) - R_BALL_SM - 6,
    x2: x, y2: rowY(0) + R_BALL_SM + 6,
    class: "beat-guide",
  }, gBeats);
}
// Bass/treble divider hairline between row 4 and row 5 — marks the clef split.
const divY = (rowY(4) + rowY(5)) / 2;
el("line", {
  x1: colX(0) - R_BALL_SM - 6, y1: divY,
  x2: colX(COL_COUNT - 1) + R_BALL_SM + 6, y2: divY,
  stroke: "rgba(20,16,10,.18)", "stroke-width": 0.7, "stroke-dasharray": "2 4",
}, gBeats);

/* ── 4c. Column labels above the matrix (A..P, then 1..16) ──
   The hardware shows musical-note labels in the top edge (key signature row). */
const COL_LABELS = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B","C","C#","D","D#"];
const gLabels = document.getElementById("g-labels");
for (let c = 0; c < COL_COUNT; c++) {
  text(gLabels, colX(c), rowY(9) - R_BALL_SM - 22, COL_LABELS[c], { size: 14, "class": "label-strong" });
}

/* ── 5. Attribute selector column (10 balls + engraved labels) ── */
const ATTR_LABELS_TOP_TO_BOTTOM = ["VEL","PIT","LEN","STA","POS","DIR","AMT","GRV","MCC","MCH"];
const gAttr = document.getElementById("g-attr");
for (let i = 0; i < ROW_COUNT; i++) {
  const r = 9 - i;  // top row = row 9
  ledBall(gAttr, `attr-${ATTR_LABELS_TOP_TO_BOTTOM[i].toLowerCase()}`, X_ATTR, rowY(r), R_BALL_SM, "sm");
  text(gLabels, X_ATTR + 28, rowY(r), ATTR_LABELS_TOP_TO_BOTTOM[i], { size: 14, anchor: "start", "class": "label-strong" });
}

/* ── 6. MUT button column ── */
const gMut = document.getElementById("g-mut");
for (let r = 0; r < ROW_COUNT; r++) {
  ledBall(gMut, `mut-${r}`, X_MUT, rowY(r), R_BALL_SM, "sm");
}

/* ── 7. EDIT encoder column ── */
const gEdit = document.getElementById("g-edit");
for (let r = 0; r < ROW_COUNT; r++) {
  encoder(gEdit, `edit-encoder-${r}`, X_EDIT, rowY(r), R_ENC);
}

/* ── 8. Bottom strip: MIX TARGET row + group labels ──
   Hardware MIX TARGET row (under matrix) holds: TGL, RND, CPY, PST, CLR, SKP, MCC, ATR,
   plus numbered selection stores 1..5. Total 16 slots aligning with matrix columns.
   See reference manual §Step selection stores (pg 17) and §Mutator block. */
const MIX_TARGET_LABELS = [
  "TGL","RND","CPY","PST","CLR","SKP","MCC","ATR",
  "1","2","3","4","5","CHN","FLT","RMX",
];
const gBottom = document.getElementById("g-bottom");
// Section label engraved above the strip (centre of matrix width).
text(gLabels,
  (colX(0) + colX(COL_COUNT - 1)) / 2,
  Y_MIX_TARGET - R_BALL_MD - 22,
  "MIX TARGET",
  { size: 13, "class": "label-strong" });
for (let c = 0; c < COL_COUNT; c++) {
  ledBall(gBottom, `mixtarget-${c}`, colX(c), Y_MIX_TARGET, R_BALL_MD, "md");
  text(gLabels, colX(c), Y_MIX_TARGET + 36, MIX_TARGET_LABELS[c], { size: 10 });
}

/* Block group labels under their respective columns. */
text(gLabels, X_MIX,    Y_LABEL_BAND + 50, "MIX",  { size: 18, "class": "label-strong" });
text(gLabels, X_SEL,    Y_LABEL_BAND + 50, "SEL",  { size: 18, "class": "label-strong" });
text(gLabels, X_MUT,    Y_LABEL_BAND + 50, "MUT",  { size: 18, "class": "label-strong" });
text(gLabels, X_EDIT,   Y_LABEL_BAND + 50, "EDIT", { size: 18, "class": "label-strong" });
text(gLabels, X_CHORD,  Y_LABEL_BAND + 50, "CHORD",{ size: 18, "class": "label-strong" });

/* ── 9. The Circle ── */
const gCircle = document.getElementById("g-circle");

// Faint guide rings (orientation only).
el("circle", { cx: C_CX, cy: C_CY, r: R_OUTER, class: "guide-ring" }, gCircle);
el("circle", { cx: C_CX, cy: C_CY, r: R_INNER, class: "guide-ring" }, gCircle);
el("circle", { cx: C_CX, cy: C_CY, r: R_MODE,  class: "guide-ring" }, gCircle);

/* 9a. MAIN encoder + reset button (top-right of Circle, per Navigation Guide pg 13). */
encoder(gCircle, "main-encoder", C_CX + R_OUTER * 0.55, C_CY - R_OUTER * 0.78, R_ENC_MAIN);
ledBall(gCircle, "reset-button", C_CX + R_OUTER * 0.55, C_CY - R_OUTER * 0.78 + 80, R_BALL_SM, "sm");

/* 9b. "200" key (top of Circle, tempo / bank toggle, per pg 11 Legacy changes). */
ledBall(gCircle, "key-200", C_CX, C_CY - R_OUTER * 0.92, R_BALL_LG, "lg");
text(gLabels, C_CX, C_CY - R_OUTER * 0.92 - 36, "200", { size: 11 });

/* 9c. Tempo numeric display — top-left quadrant of the outer ring.
   Hardware uses two vertical LED columns: red LEDs count tens, green LEDs
   point at ones (reference manual §Step velocity pg 15 describes the same
   tens/ones pattern reused for numeric quadrants). Position well outside the
   inner ring so it doesn't crowd MOD/SEL/CAD. */
const tempoCX = C_CX - R_OUTER * 0.78;
const tempoCY = C_CY - R_OUTER * 0.50;
const tempoCols = 2;          // tens column, ones column
const tempoRows = 7;          // 0..6 — enough headroom for BPM digits
const tempoColGap = 28;
const tempoRowPitch = 22;
for (let col = 0; col < tempoCols; col++) {
  for (let row = 0; row < tempoRows; row++) {
    ledBall(gCircle,
      `tempo-${col === 0 ? "tens" : "ones"}-${row}`,
      tempoCX + (col - 0.5) * tempoColGap,
      tempoCY - ((tempoRows - 1) / 2 - row) * tempoRowPitch,
      R_BALL_SM * 0.55, "sm");
  }
}
text(gLabels, tempoCX, tempoCY + tempoRows * tempoRowPitch / 2 + 22, "TEMPO", { size: 11, "class": "label-strong" });

/* 9d. SCALE note ring — bottom-left arc, 12 chromatic notes.
   Manual §Composing scales (pg 70): 12-note ring with root highlighted in Orange. */
const SCALE_NOTES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
// Scale ring wraps the bottom-left of the Circle, sweeping from the lower
// transport boundary (~100°) counter-clockwise through the bottom-left into
// the upper-left (~280°). Wider sweep than first pass — matches the open
// spiral of the hardware photo. Transport occupies the lower-right quadrant
// so we start just past it.
const SCALE_START_DEG = 100;
const SCALE_SWEEP_DEG = 200;   // ends near 300° (upper-left)
for (let i = 0; i < 12; i++) {
  const a = (SCALE_START_DEG + (i / 11) * SCALE_SWEEP_DEG) * Math.PI / 180;
  const rx = C_CX + Math.cos(a) * (R_OUTER * 0.82);
  const ry = C_CY + Math.sin(a) * (R_OUTER * 0.82);
  ledBall(gCircle, `scale-note-${i}`, rx, ry, R_BALL_SM, "sm");
  text(gLabels, rx, ry + R_BALL_SM + 14, SCALE_NOTES[i], { size: 9 });
}

/* 9e. SCALE inner trio (MOD / SEL / CAD) — three buttons inside the scale arc.
   Manual §Force to scale (pg 70). */
const SCALE_INNER = [
  { id: "scale-mod", lbl: "MOD", a: 200 },
  { id: "scale-sel", lbl: "SEL", a: 225 },
  { id: "scale-cad", lbl: "CAD", a: 250 },
];
SCALE_INNER.forEach(b => {
  const a = b.a * Math.PI / 180;
  const rx = C_CX + Math.cos(a) * (R_INNER + 30);
  const ry = C_CY + Math.sin(a) * (R_INNER + 30);
  ledBall(gCircle, b.id, rx, ry, R_BALL_MD, "md");
  text(gLabels, rx, ry + R_BALL_MD + 16, b.lbl, { size: 10 });
});
text(gLabels, C_CX - R_OUTER * 0.18, C_CY + R_OUTER * 0.78, "SCALE", { size: 14, "class": "label-strong" });

/* 9f. MODE block — PAGE prominent at the inner-ring centre, GRID/TRACK/STEP/
   MAP/PLAY arranged around it. Hardware (Navigation Guide pg 24) makes the
   PAGE indicator the orientation landmark; we render it larger to match. */
const MODE_ORBIT_R = 88;
const MODE_BUTTONS = [
  { id: "mode-grid",  lbl: "GRID",  ang: -90 }, // N
  { id: "mode-track", lbl: "TRACK", ang:   0 }, // E
  { id: "mode-step",  lbl: "STEP",  ang:  90 }, // S
  { id: "mode-map",   lbl: "MAP",   ang: 180 }, // W
  { id: "mode-play",  lbl: "PLAY",  ang:  45 }, // SE diagonal
];
MODE_BUTTONS.forEach(b => {
  const a = b.ang * Math.PI / 180;
  const rx = C_CX + Math.cos(a) * MODE_ORBIT_R;
  const ry = C_CY + Math.sin(a) * MODE_ORBIT_R;
  ledBall(gCircle, b.id, rx, ry, R_BALL_LG, "lg");
  text(gLabels, rx, ry + R_BALL_LG + 14, b.lbl, { size: 10, "class": "label-strong" });
});
// PAGE at centre, larger to match the hardware's emphasis.
ledBall(gCircle, "mode-page", C_CX, C_CY, R_BALL_LG * 1.35, "lg");
text(gLabels, C_CX, C_CY + R_BALL_LG * 1.35 + 14, "PAGE", { size: 11, "class": "label-strong" });

/* 9g. TRANSPORT — bottom-right quadrant of the Circle.
   Reference manual §Transport (Nav Guide pg 13): Play, Stop, Pause, Record,
   step-back / step-forward arrows. Glyphs rendered as SVG paths instead of
   Unicode so they kern and scale consistently across hosts. */
const TRANSPORT = [
  { id: "transport-back",  glyph: "back",  ang: 10 },
  { id: "transport-stop",  glyph: "stop",  ang: 25 },
  { id: "transport-rec",   glyph: "rec",   ang: 40 },
  { id: "transport-pause", glyph: "pause", ang: 55 },
  { id: "transport-play",  glyph: "play",  ang: 70 },
  { id: "transport-fwd",   glyph: "fwd",   ang: 85 },
];
TRANSPORT.forEach(b => {
  const a = b.ang * Math.PI / 180;
  const rx = C_CX + Math.cos(a) * (R_OUTER * 0.82);
  const ry = C_CY + Math.sin(a) * (R_OUTER * 0.82);
  ledBall(gCircle, b.id, rx, ry, R_BALL_LG, "lg");
  transportGlyph(gLabels, b.glyph, rx, ry + R_BALL_LG + 16, 7);
});
text(gLabels, C_CX + R_OUTER * 0.55, C_CY + R_OUTER * 0.78, "TRANSPORT", { size: 12, "class": "label-strong" });

/* ── 10. CHORD column on the far right edge (7 note slots, top-down). ── */
const gChord = document.getElementById("g-chord");
for (let i = 0; i < CHORD_COUNT; i++) {
  ledBall(gChord, `chord-note-${i + 1}`, X_CHORD, CHORD_TOP_Y + i * CHORD_PITCH, R_BALL_MD, "md");
  text(gLabels, X_CHORD + 28, CHORD_TOP_Y + i * CHORD_PITCH, String(i + 1), { size: 11, anchor: "start" });
}

/* ── LED state API ──
   Vocabulary (10): off | green | red | orange | {green|red|orange}_flash |
                    {green|red|orange}_shine
   Per reference manual §Step skip (pg 14). Hardware uses the flash variants to
   denote attention states, shine for hyperstep / chase markers. */
const LED_STATES = [
  "off",
  "green", "red", "orange",
  "green_flash", "red_flash", "orange_flash",
  "green_shine", "red_shine", "orange_shine",
];

function setLed(id, state) {
  const node = document.getElementById(id);
  if (!node || !node.classList.contains("led")) return false;
  if (LED_STATES.indexOf(state) === -1) {
    console.warn("setLed: unknown state", state);
    return false;
  }
  node.setAttribute("data-state", state);
  return true;
}

function setLedScope(scope, state) {
  const sels = {
    all:       ".led",
    matrix:    "[id^='matrix-r']",
    sel:       "[id^='sel-']",
    mut:       "[id^='mut-']",
    attr:      "[id^='attr-']",
    mixtarget: "[id^='mixtarget-']",
    mode:      "[id^='mode-']",
    transport: "[id^='transport-']",
    scale:     "[id^='scale-']",
    chord:     "[id^='chord-']",
    tempo:     "[id^='tempo-']",
  };
  const sel = sels[scope] || sels.all;
  const nodes = document.querySelectorAll(sel + ".led, " + sel);
  let count = 0;
  nodes.forEach(n => {
    if (n.classList && n.classList.contains("led")) {
      n.setAttribute("data-state", state);
      count++;
    }
  });
  return count;
}

// Expose for console / future adapter.
window.setLed = setLed;
window.setLedScope = setLedScope;
window.LED_STATES = LED_STATES;

/* ── Adapter wiring ─────────────────────────────────────────────────────
   ui-mock/adapter.js exposes window.OctopusAdapter.createAdapter().
   We instantiate once and expose window.octoMessage(name, ...args) so the
   Max jweb host (or any test harness) can drive the panel using the same
   call signatures as octopus_jweb_bridge.js. */
(function adapterGlue() {
  if (!window.OctopusAdapter) {
    console.warn("OctopusAdapter not loaded; adapter wiring skipped.");
    return;
  }
  const adapter = window.OctopusAdapter.createAdapter();

  function applyCalls(calls) {
    if (!calls || !calls.length) return 0;
    let applied = 0;
    for (let i = 0; i < calls.length; i++) {
      if (setLed(calls[i].id, calls[i].state)) applied++;
    }
    return applied;
  }

  const ROUTES = {
    updateStep:     (ti, si, a, sk, ch) => adapter.updateStep(+ti, +si, !!+a, !!+sk, !!+ch),
    updatePlayhead: (ti, pos)           => adapter.updatePlayhead(+ti, +pos),
    setTempo:       (bpm)               => adapter.setTempo(+bpm),
    setTransport:   (running)           => adapter.setTransport(!!+running),
    loadPage:       (json)              => adapter.loadPage(json),
    setMode:        (mode, jsonSel)     => adapter.setMode(mode, jsonSel ? JSON.parse(jsonSel) : null),
    setSelection:   (jsonSel)           => adapter.setSelection(JSON.parse(jsonSel)),
  };

  window.octoMessage = function octoMessage(name /*, ...args */) {
    const fn = ROUTES[name];
    if (!fn) { console.warn("octoMessage: unknown route", name); return 0; }
    const args = Array.prototype.slice.call(arguments, 1);
    return applyCalls(fn.apply(null, args));
  };

  // For console testing / future inspection.
  window.octoAdapter = adapter;
})();

/* ── Interaction wiring ──
   Delegated pointer handlers on the SVG root. Click / shift-click / double-click
   route through ui-mock/interactions.js's interpretClick(); encoder drags
   accumulate vertical pixels and emit ticks via interpretEncoderDelta(). All
   outputs flow through window.octoEmit so Max can replace the default
   console-logging sink with an outlet send. */
(function interactionsGlue() {
  if (!window.OctopusInteractions) {
    console.warn("OctopusInteractions not loaded; input wiring skipped.");
    return;
  }
  const I = window.OctopusInteractions;
  const svg = document.getElementById("panel-svg");
  const recent = [];
  const RECENT_CAP = 12;

  function defaultEmit(name) {
    const args = Array.prototype.slice.call(arguments, 1);
    const entry = name + (args.length ? " " + args.join(" ") : "");
    recent.unshift(entry);
    if (recent.length > RECENT_CAP) recent.pop();
    const log = document.getElementById("emit-log");
    if (log) log.textContent = recent.join("\n");
    console.log("octoEmit:", entry);
  }
  if (typeof window.octoEmit !== "function") window.octoEmit = defaultEmit;

  // Walk up from a hit target to the nearest ancestor with an id we recognise.
  function findInteractive(target) {
    let n = target;
    while (n && n !== svg) {
      if (n.id) return n;
      n = n.parentNode;
    }
    return null;
  }

  svg.addEventListener("click", function (ev) {
    const node = findInteractive(ev.target);
    if (!node) return;
    const msg = I.interpretClick(node.id, { shift: ev.shiftKey, alt: ev.altKey, meta: ev.metaKey }, false);
    if (msg) window.octoEmit.apply(null, [msg.name].concat(msg.args));
  });

  svg.addEventListener("dblclick", function (ev) {
    const node = findInteractive(ev.target);
    if (!node) return;
    const msg = I.interpretClick(node.id, { shift: ev.shiftKey }, true);
    if (msg) window.octoEmit.apply(null, [msg.name].concat(msg.args));
  });

  // Encoder drag — pointer events.
  let drag = null;
  svg.addEventListener("pointerdown", function (ev) {
    const node = findInteractive(ev.target);
    if (!node || !/encoder/.test(node.id)) return;
    drag = { id: node.id, lastY: ev.clientY, accumulatedPx: 0 };
    try { ev.target.setPointerCapture && ev.target.setPointerCapture(ev.pointerId); } catch (e) {}
  });
  window.addEventListener("pointermove", function (ev) {
    if (!drag) return;
    drag.accumulatedPx += (drag.lastY - ev.clientY); // up = positive
    drag.lastY = ev.clientY;
    const msg = I.interpretEncoderDelta(drag.id, drag.accumulatedPx);
    if (msg) {
      window.octoEmit.apply(null, [msg.name].concat(msg.args));
      drag.accumulatedPx = msg.remainderPx;
    }
  });
  window.addEventListener("pointerup", function () { drag = null; });
  window.addEventListener("pointercancel", function () { drag = null; });
})();

/* ── Demo runner ──
   Plays a scripted sequence through octoMessage so anyone can see the panel
   come alive without booting Max. ~7 second loop: load preset-1-style page,
   run a chase light across two tracks, switch modes mid-sequence, restore. */
(function demoRunner() {
  let timers = [];
  function delay(ms, fn) { timers.push(setTimeout(fn, ms)); }
  function stopAll() {
    timers.forEach(clearTimeout);
    timers = [];
  }

  function buildSyntheticPage() {
    const page = { bank: 0, page: 0, tracks: [] };
    for (let ti = 0; ti < 10; ti++) {
      const steps = [];
      for (let si = 0; si < 16; si++) {
        steps.push({
          active: si % 4 === 0,
          skip: ti === 5 && si === 6,         // one skipped step for visual variety
          chords: ti === 3 && si === 8 ? [3, 7] : [],
          vel_offset: (si * 8) - 64,           // ascending bar shape
        });
      }
      page.tracks.push({ steps });
    }
    return page;
  }

  function run() {
    stopAll();
    octoMessage("loadPage", JSON.stringify(buildSyntheticPage()));
    octoMessage("setTempo", 124);
    octoMessage("setTransport", 1);
    if (window.setLedScope) {
      window.setLedScope("scale", "green");
      window.setLed && window.setLed("scale-note-0", "orange");
    }

    // Chase lights on tracks 0 and 5; tempo-aligned at ~16 steps over 4s.
    const stepMs = 250;
    for (let si = 0; si < 16; si++) {
      delay(si * stepMs,        () => octoMessage("updatePlayhead", 0, si));
      delay(si * stepMs + 40,   () => octoMessage("updatePlayhead", 5, si));
    }

    // Mid-sequence: dip into track mode then back.
    delay(2200, () => octoMessage("setMode", "track", JSON.stringify({ track: 3, mixTarget: "vel" })));
    delay(3400, () => octoMessage("setMode", "page"));

    // Finish: clear playheads + stop transport.
    delay(4200, () => {
      octoMessage("updatePlayhead", 0, -1);
      octoMessage("updatePlayhead", 5, -1);
      octoMessage("setTransport", 0);
    });
  }

  function hardStop() {
    stopAll();
    octoMessage("updatePlayhead", 0, -1);
    octoMessage("updatePlayhead", 5, -1);
    octoMessage("setTransport", 0);
  }

  const runBtn  = document.getElementById("dev-demo-run");
  const stopBtn = document.getElementById("dev-demo-stop");
  if (runBtn)  runBtn.addEventListener("click", run);
  if (stopBtn) stopBtn.addEventListener("click", hardStop);
})();

/* ── Dev panel wiring ── */
(function devPanel() {
  const panel = document.getElementById("dev-panel");
  const grid  = document.getElementById("dev-state-grid");
  const scope = document.getElementById("dev-scope");
  const toggle = panel.querySelector("button.toggle");

  LED_STATES.forEach(s => {
    const b = document.createElement("button");
    b.type = "button";
    b.textContent = s;
    b.addEventListener("click", () => {
      const n = setLedScope(scope.value, s);
      b.title = "applied to " + n + " LEDs";
    });
    grid.appendChild(b);
  });

  toggle.addEventListener("click", () => {
    const collapsed = panel.getAttribute("data-collapsed") === "true";
    panel.setAttribute("data-collapsed", collapsed ? "false" : "true");
    toggle.textContent = collapsed ? "−" : "+";
  });
})();
</script>
